version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: gimnasio_db
    restart: always
    environment:
      
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: fitpass_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: